<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Adaptive Healing Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --panel-soft: #f9fbfd;
        --ink: #17202a;
        --muted: #667085;
        --line: #d9e0ea;
        --accent: #167c80;
        --accent-dark: #0f6266;
        --green: #147a4a;
        --green-bg: #e8f7ef;
        --amber: #9a6500;
        --amber-bg: #fff4dc;
        --red: #b42318;
        --red-bg: #ffebe8;
        --blue: #1f5fa8;
        --blue-bg: #e9f2ff;
        --shadow: 0 2px 8px rgba(25, 38, 60, 0.08);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          linear-gradient(180deg, #edf3f8 0, rgba(237, 243, 248, 0) 360px),
          var(--bg);
        color: var(--ink);
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      header {
        border-bottom: 1px solid rgba(217, 224, 234, 0.75);
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(12px);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .topbar {
        align-items: center;
        display: flex;
        gap: 18px;
        justify-content: flex-start;
        margin: 0 auto;
        max-width: 1280px;
        min-height: 68px;
        padding: 0 28px;
      }

      .brand {
        align-items: center;
        display: flex;
        gap: 12px;
        min-width: 0;
      }

      .brand-mark {
        align-items: center;
        background: var(--accent);
        border-radius: 8px;
        color: #fff;
        display: grid;
        font-weight: 700;
        height: 38px;
        letter-spacing: 0;
        place-items: center;
        width: 38px;
      }

      .brand h1 {
        font-size: 18px;
        line-height: 1.2;
        margin: 0;
      }

      .brand p {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
        margin: 2px 0 0;
      }

      .button {
        align-items: center;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        display: inline-flex;
        font-size: 14px;
        font-weight: 650;
        gap: 8px;
        min-height: 38px;
        padding: 0 13px;
        text-decoration: none;
      }

      .button:hover,
      .button.is-active {
        border-color: var(--accent);
        color: var(--accent-dark);
      }

      main {
        margin: 0 auto;
        max-width: 1280px;
        padding: 28px;
      }

      .hero {
        align-items: end;
        margin-bottom: 22px;
        max-width: 760px;
      }

      .hero h2 {
        font-size: 22px;
        letter-spacing: 0;
        line-height: 1.2;
        margin: 0 0 8px;
      }

      .hero p {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
        margin: 0;
        max-width: 720px;
      }

      .stats {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin: 18px 0 24px;
      }

      .stat {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        min-height: 92px;
        padding: 16px;
      }

      .stat span {
        color: var(--muted);
        display: block;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .stat strong {
        display: block;
        font-size: 30px;
        line-height: 1;
        margin-top: 12px;
      }

      .toolbar {
        align-items: center;
        display: flex;
        gap: 12px;
        justify-content: space-between;
        margin: 22px 0 14px;
      }

      .toolbar h3 {
        font-size: 18px;
        margin: 0;
      }

      .search {
        background: transparent;
        border: 0;
        border-bottom: 1px solid #cfd8e3;
        border-radius: 0;
        color: var(--ink);
        min-height: 34px;
        min-width: 280px;
        padding: 0 2px;
      }

      .search:focus {
        border-bottom-color: #7c6ee6;
        outline: none;
      }

      .run-list {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: none;
        overflow: hidden;
      }

      .run-table-wrap {
        overflow-x: auto;
      }

      .run-table {
        border-collapse: collapse;
        min-width: 960px;
        width: 100%;
      }

      .run-table th,
      .run-table td {
        border-bottom: 1px solid #edf0f4;
        font-size: 12px;
        padding: 12px 14px;
        text-align: left;
        vertical-align: middle;
        white-space: nowrap;
      }

      .run-table th {
        color: #526170;
        font-weight: 700;
      }

      .run-table tbody tr {
        transition: background-color 140ms ease;
      }

      .run-table tbody tr:hover {
        background: #fafcff;
      }

      .run-name-cell {
        min-width: 260px;
      }

      .run-name {
        color: #2d6f9f;
        font-size: 12px;
        font-weight: 700;
      }

      .run-meta {
        color: var(--muted);
        font-size: 11px;
        margin-top: 3px;
      }

      .numeric-cell {
        text-align: center;
      }

      .pill-row {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .pill {
        align-items: center;
        background: #eef2f6;
        border: 1px solid transparent;
        border-radius: 5px;
        color: #344054;
        display: inline-flex;
        font-size: 11px;
        font-weight: 700;
        gap: 6px;
        min-height: 22px;
        padding: 0 8px;
        white-space: nowrap;
      }

      .pill.completed,
      .pill.fixed {
        background: #eaf3ed;
        color: #2f6f48;
      }

      .pill.running,
      .pill.needs_more_evidence {
        background: #fff4dc;
        color: #8b6208;
      }

      .pill.failed,
      .pill.invalid {
        background: #ffebe8;
        color: #9f251b;
      }

      .pill.confirmed,
      .pill.stage {
        background: #e9f2ff;
        color: #245b9a;
      }

      .run-action {
        background: #7c6ee6;
        border: 0;
        border-radius: 6px;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        min-height: 32px;
        padding: 0 12px;
        transition: background-color 140ms ease, box-shadow 140ms ease, transform 140ms ease;
      }

      .run-action:hover {
        background: #6d5ed8;
        box-shadow: 0 2px 7px rgba(92, 79, 196, 0.22);
        transform: translateY(-1px);
      }

      .run-title-row {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 8px 10px;
      }

      .meta-line {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        margin: 0;
      }

      .info-chip {
        background: #f0faf9;
        border: 1px solid #bfe5e1;
        border-radius: 999px;
        color: #0f6266;
        font-size: 12px;
        font-weight: 750;
        min-height: 24px;
        padding: 4px 9px;
      }

      .detail {
        display: none;
      }

      .detail.is-active,
      .home.is-active {
        display: block;
      }

      .home {
        display: none;
      }

      .detail-nav {
        margin-bottom: 12px;
      }

      .back-button {
        background: #fff;
        border-color: var(--line);
        box-shadow: 0 1px 4px rgba(25, 38, 60, 0.06);
        color: #344054;
        min-height: 36px;
        padding: 0 13px;
      }

      .back-button:hover {
        background: #fafcff;
        border-color: #b8c8d8;
        color: var(--accent-dark);
      }

      .detail-header {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        margin-bottom: 16px;
        padding: 22px;
      }

      .detail-title {
        align-items: stretch;
        display: flex;
        gap: 18px;
        justify-content: space-between;
      }

      .detail-summary-main {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 8px;
        justify-content: flex-start;
        padding: 2px 0;
      }

      .detail-counts-line {
        color: #344054;
        font-size: 13px;
        line-height: 1.5;
        margin: 0;
      }

      .detail-title h2 {
        font-size: 30px;
        line-height: 1.1;
        margin: 8px 0 6px;
      }

      .tabs {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 18px 0 0;
      }

      .tab-panel {
        display: none;
      }

      .tab-panel.is-active {
        display: block;
      }

      .section-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: 16px;
      }

      .panel h3,
      .panel h4 {
        margin: 0 0 10px;
      }

      .panel p {
        color: #344054;
        font-size: 14px;
        line-height: 1.55;
        margin: 0 0 10px;
      }

      .list {
        display: grid;
        gap: 12px;
      }

      .record {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      .record-head {
        align-items: start;
        display: flex;
        gap: 12px;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .record h4 {
        font-size: 16px;
        line-height: 1.25;
        margin: 0;
      }

      .record p {
        color: #344054;
        font-size: 14px;
        line-height: 1.55;
        margin: 8px 0 0;
      }

      .timeline {
        border-left: 2px solid #d6e5e7;
        display: grid;
        gap: 14px;
        margin-left: 10px;
        padding-left: 18px;
      }

      .timeline-toolbar {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px 14px;
        justify-content: space-between;
        margin: 0 0 14px;
      }

      .persona-filter-group {
        background: #eef2f6;
        border-radius: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        padding: 4px;
      }

      .persona-filter {
        background: transparent;
        border: 0;
        border-radius: 6px;
        color: #526170;
        font-size: 13px;
        font-weight: 600;
        min-height: 34px;
        padding: 0 14px;
        transition: background-color 140ms ease, color 140ms ease, box-shadow 140ms ease;
      }

      .persona-filter:hover,
      .persona-filter.is-active {
        background: #fff;
        color: var(--ink);
        box-shadow: 0 1px 3px rgba(25, 38, 60, 0.08);
      }

      .timeline-count {
        color: var(--muted);
        font-size: 12px;
        margin: 0;
      }

      .timeline-item {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        position: relative;
      }

      .timeline-item::before {
        background: var(--accent);
        border: 3px solid var(--bg);
        border-radius: 999px;
        content: "";
        height: 12px;
        left: -26px;
        position: absolute;
        top: 18px;
        width: 12px;
      }

      .timeline-meta {
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
        margin-bottom: 6px;
      }

      .artifact-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      }

      .artifact {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }

      .artifact img {
        aspect-ratio: 16 / 10;
        background: #eef2f6;
        display: block;
        object-fit: cover;
        width: 100%;
      }

      .artifact div {
        padding: 11px;
      }

      .artifact strong {
        display: block;
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .artifact span {
        color: var(--muted);
        display: block;
        font-size: 12px;
        margin-top: 4px;
        overflow-wrap: anywhere;
      }

      .empty {
        background: rgba(255, 255, 255, 0.72);
        border: 1px dashed #b8c4d2;
        border-radius: 8px;
        color: var(--muted);
        padding: 22px;
        text-align: center;
      }

      code {
        background: #eef2f6;
        border-radius: 5px;
        color: #344054;
        font-size: 0.92em;
        padding: 2px 5px;
      }

      @media (max-width: 980px) {
        .stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

      }

      @media (max-width: 680px) {
        .topbar,
        main {
          padding-left: 16px;
          padding-right: 16px;
        }

        .toolbar,
        .detail-title {
          align-items: stretch;
          flex-direction: column;
        }

        .search {
          min-width: 0;
          width: 100%;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .timeline-toolbar,
        .persona-filter-group {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="topbar">
        <div class="brand">
          <div class="brand-mark">DY</div>
          <div>
            <h1>Adaptive Healing Dashboard</h1>
            <p>Run history, verifier outcomes, fixes, and persona transcripts.</p>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="home is-active" id="homeView">
        <div class="hero">
          <div>
            <h2>Runs</h2>
            <p>Every available run is listed here first. Open a run to inspect reports, verifier decisions, fix results, timeline events, screenshots, and saved reasoning.</p>
          </div>
        </div>

        <div class="stats" id="stats"></div>

        <div class="toolbar">
          <h3>All Runs</h3>
          <input class="search" id="searchInput" type="search" placeholder="Search run, status, stage, persona">
        </div>

        <div class="run-list" id="runList"></div>
      </section>

      <section class="detail" id="detailView"></section>
    </main>

    <script>
      const rootUrl = new URL("../../", window.location.href);
      const artifactsUrl = new URL("artifacts/", rootUrl);
      const indexUrl = new URL("dashboard_index.json", artifactsUrl);

      const state = {
        index: null,
        runs: [],
        selectedRun: null,
        selectedBundle: null,
        activeTab: "overview",
        timelinePersona: "all",
      };

      const homeView = document.querySelector("#homeView");
      const detailView = document.querySelector("#detailView");
      const stats = document.querySelector("#stats");
      const runList = document.querySelector("#runList");
      const searchInput = document.querySelector("#searchInput");

      const escapeHtml = value => String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;",
      }[char]));

      const labelize = value => escapeHtml(String(value ?? "unknown").replaceAll("_", " "));

      function formatDate(value) {
        if (!value) return "Not completed";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat(undefined, {
          dateStyle: "medium",
          timeStyle: "short",
        }).format(date);
      }

      function duration(startedAt, completedAt) {
        if (!startedAt) return "Unknown";
        const start = new Date(startedAt);
        const end = completedAt ? new Date(completedAt) : new Date();
        if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return "Unknown";
        const seconds = Math.max(0, Math.round((end - start) / 1000));
        const minutes = Math.floor(seconds / 60);
        const remaining = seconds % 60;
        return minutes > 0 ? `${minutes}m ${remaining}s` : `${remaining}s`;
      }

      function metricValue(run, key) {
        return Number(run?.summary?.[key] ?? 0);
      }

      function statusClass(value) {
        return String(value ?? "").toLowerCase().replace(/[^a-z0-9_]/g, "_");
      }

      function pill(value, extra = "") {
        return `<span class="pill ${statusClass(value)} ${extra}">${labelize(value)}</span>`;
      }

      function runBadges(run) {
        const badges = [pill(run.status)];
        if (run.stage && run.stage !== "complete" && run.stage !== run.status) {
          badges.push(pill(`stage: ${run.stage}`, "stage"));
        }
        if (run.has_bundle === false) {
          badges.push(`<span class="pill running">metadata only</span>`);
        }
        return badges.join("");
      }

      function formatEndDate(value) {
        return value ? formatDate(value) : "In progress";
      }

      function personasRan(run) {
        return Array.isArray(run?.personas) ? run.personas.length : 0;
      }

      function pluralize(count, singular, plural = `${singular}s`) {
        return `${count} ${count === 1 ? singular : plural}`;
      }

      function detailStatsSentence(runState, run) {
        const summary = runState.summary || {};
        const reports = Number(summary.reports_total ?? 0);
        const confirmed = Number(summary.confirmed_total ?? 0);
        const fixed = Number(summary.fixed_total ?? 0);
        const personas = personasRan(run);
        return [
          pluralize(reports, "bug report"),
          pluralize(confirmed, "bug confirmed", "bugs confirmed"),
          pluralize(fixed, "bug fix", "bug fixes"),
          `${pluralize(personas, "persona")} ran`,
        ].join(", ");
      }

      function summaryText(runState) {
        if (runState.status === "completed") {
          return "Status completed.";
        }
        return `Status ${labelize(runState.status)} in ${labelize(runState.stage)}.`;
      }

      function timelinePersonaOptions(bundle) {
        const runPersonas = Array.isArray(state.selectedRun?.personas) ? state.selectedRun.personas : [];
        const eventPersonas = (bundle?.events || [])
          .filter(event => String(event.source || "").includes("persona") || String(event.source_id || "").startsWith("persona_"))
          .map(event => event.source_id)
          .filter(Boolean);
        return [...new Set([...runPersonas, ...eventPersonas])].sort();
      }

      function runActionCell(run) {
        return `<button class="run-action" type="button" data-run-id="${escapeHtml(run.run_id)}">View run</button>`;
      }

      function assetUrl(uri) {
        if (!uri) return "";
        const raw = String(uri).replaceAll("\\", "/");
        if (/^https?:\/\//.test(raw) || raw.startsWith("data:")) return raw;
        if (raw.startsWith("artifacts/")) return new URL(raw, rootUrl).href;
        const artifactIndex = raw.lastIndexOf("/artifacts/");
        if (artifactIndex >= 0) return new URL(raw.slice(artifactIndex + 1), rootUrl).href;
        return raw;
      }

      async function fetchJson(url) {
        const nextUrl = new URL(url);
        nextUrl.searchParams.set("t", Date.now());
        const response = await fetch(nextUrl);
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        return response.json();
      }

      async function discoverRunsFromDirectoryListing() {
        const response = await fetch(`${artifactsUrl}?t=${Date.now()}`);
        if (!response.ok) throw new Error("Artifacts directory listing unavailable.");
        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, "text/html");
        const runDirs = [...doc.querySelectorAll("a")]
          .map(link => link.getAttribute("href"))
          .filter(Boolean)
          .map(href => href.replace("./", "").replace(/\/$/, ""))
          .filter(name => /^run_[A-Za-z0-9_-]+$/.test(name));

        const runs = [];
        for (const runDir of runDirs) {
          try {
            const runState = await fetchJson(new URL(`${runDir}/run_state.json`, artifactsUrl));
            runs.push({
              run_id: runState.run_id,
              run_dir: runDir,
              bundle_path: `${runDir}/dashboard_bundle.json`,
              status: runState.status,
              stage: runState.stage,
              started_at: runState.started_at,
              completed_at: runState.completed_at,
              updated_at: runState.completed_at || runState.started_at,
              components: runState.components || {},
              summary: runState.summary || {},
              personas: [],
              models: [],
              counts: {},
              has_bundle: true,
            });
          } catch (error) {
            continue;
          }
        }
        runs.sort((a, b) => String(b.started_at).localeCompare(String(a.started_at)));
        return {
          schema_version: "1.0.0",
          generated_at: new Date().toISOString(),
          totals: buildTotals(runs),
          runs,
        };
      }

      function buildTotals(runs) {
        return {
          runs: runs.length,
          running: runs.filter(run => run.status === "running").length,
          completed: runs.filter(run => run.status === "completed").length,
          failed: runs.filter(run => run.status === "failed").length,
          reports: runs.reduce((total, run) => total + metricValue(run, "reports_total"), 0),
          confirmed: runs.reduce((total, run) => total + metricValue(run, "confirmed_total"), 0),
          fixed: runs.reduce((total, run) => total + metricValue(run, "fixed_total"), 0),
        };
      }

      async function loadIndex() {
        try {
          state.index = await fetchJson(indexUrl);
        } catch (indexError) {
          try {
            state.index = await discoverRunsFromDirectoryListing();
          } catch (listingError) {
            state.index = {
              schema_version: "1.0.0",
              generated_at: null,
              totals: buildTotals([]),
              runs: [],
            };
          }
        }
        state.runs = state.index.runs || [];
        renderHome();
        openRunFromHash();
      }

      function renderHome() {
        homeView.classList.add("is-active");
        detailView.classList.remove("is-active");
        const totals = state.index?.totals || buildTotals(state.runs);
        stats.innerHTML = [
          ["Total Runs", totals.runs ?? 0],
          ["Total Bugs Found", totals.reports ?? 0],
          ["Total Bug Fixes", totals.fixed ?? 0],
        ].map(([label, value]) => `
          <div class="stat">
            <span>${escapeHtml(label)}</span>
            <strong>${escapeHtml(value)}</strong>
          </div>
        `).join("");
        renderRunList();
      }

      function renderRunList() {
        const query = searchInput.value.trim().toLowerCase();
        const runs = state.runs.filter(run => {
          const haystack = [
            run.run_id,
            run.status,
            run.stage,
            ...(run.personas || []),
          ].join(" ").toLowerCase();
          return haystack.includes(query);
        });

        if (!runs.length) {
          runList.innerHTML = `<div class="empty">No runs match the current filter.</div>`;
          return;
        }

        runList.innerHTML = `
          <div class="run-table-wrap">
            <table class="run-table">
              <thead>
                <tr>
                  <th>Run Name</th>
                  <th>Start</th>
                  <th>End</th>
                  <th>Elapsed</th>
                  <th class="numeric-cell">Bug Reports</th>
                  <th class="numeric-cell">Bugs Confirmed</th>
                  <th class="numeric-cell">Bugs Fixed</th>
                  <th class="numeric-cell">Personas Ran</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                ${runs.map(run => `
                  <tr>
                    <td class="run-name-cell">
                      <div class="run-title-row">
                        <div class="run-name">${escapeHtml(run.run_id)}</div>
                        <div class="pill-row">${runBadges(run)}</div>
                      </div>
                      <div class="run-meta">${escapeHtml(run.run_dir || "")}</div>
                    </td>
                    <td>${formatDate(run.started_at)}</td>
                    <td>${formatEndDate(run.completed_at)}</td>
                    <td>${duration(run.started_at, run.completed_at)}</td>
                    <td class="numeric-cell">${metricValue(run, "reports_total")}</td>
                    <td class="numeric-cell">${metricValue(run, "confirmed_total")}</td>
                    <td class="numeric-cell">${metricValue(run, "fixed_total")}</td>
                    <td class="numeric-cell">${personasRan(run)}</td>
                    <td>${runActionCell(run)}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;

        runList.querySelectorAll(".run-action[data-run-id]").forEach(button => {
          button.addEventListener("click", () => openRun(button.dataset.runId));
        });
      }

      async function openRun(runId) {
        const run = state.runs.find(item => item.run_id === runId);
        if (!run) return;
        window.location.hash = `run=${encodeURIComponent(runId)}`;
        state.selectedRun = run;
        state.selectedBundle = null;
        state.activeTab = "overview";
        state.timelinePersona = "all";
        renderDetail();

        if (run.bundle_path) {
          try {
            state.selectedBundle = await fetchJson(new URL(run.bundle_path, artifactsUrl));
            renderDetail();
          } catch (error) {
            state.selectedBundle = null;
            renderDetail("Run metadata loaded, but its dashboard bundle is not available yet.");
          }
        } else {
          renderDetail("This run has metadata but no dashboard bundle yet.");
        }
      }

      function openRunFromHash() {
        const match = window.location.hash.match(/run=([^&]+)/);
        if (!match) return;
        const runId = decodeURIComponent(match[1]);
        if (state.runs.some(run => run.run_id === runId)) {
          openRun(runId);
        }
      }

      function showHome() {
        window.location.hash = "";
        state.selectedRun = null;
        state.selectedBundle = null;
        state.timelinePersona = "all";
        renderHome();
      }

      function renderDetail(notice = "") {
        const run = state.selectedRun;
        const bundle = state.selectedBundle;
        if (!run) return;

        const runState = bundle?.run_state || {
          run_id: run.run_id,
          status: run.status,
          stage: run.stage,
          started_at: run.started_at,
          completed_at: run.completed_at,
          components: run.components || {},
          summary: run.summary || {},
        };

        homeView.classList.remove("is-active");
        detailView.classList.add("is-active");

        detailView.innerHTML = `
          <div class="detail-nav">
            <button class="button back-button" id="backButton" type="button">Back to runs</button>
          </div>
          <div class="detail-header">
            <div class="detail-title">
              <div class="detail-summary-main">
                <div class="run-title-row">
                  <h2>${escapeHtml(runState.run_id)}</h2>
                  <div class="pill-row">
                    ${runBadges({
                      status: runState.status,
                      stage: runState.stage,
                      has_bundle: true,
                    })}
                  </div>
                </div>
                <p class="meta-line">${formatDate(runState.started_at)} · ${duration(runState.started_at, runState.completed_at)}</p>
                <p class="detail-counts-line">${escapeHtml(detailStatsSentence(runState, state.selectedRun))}</p>
              </div>
            </div>
            <div class="tabs" id="tabs">
              ${["overview", "reports", "verifier", "fixes", "timeline", "artifacts"].map(tab => `
                <button class="button ${state.activeTab === tab ? "is-active" : ""}" type="button" data-tab="${tab}">${labelize(tab)}</button>
              `).join("")}
            </div>
          </div>
          ${notice ? `<div class="empty">${escapeHtml(notice)}</div>` : ""}
          <div id="tabContent"></div>
        `;

        detailView.querySelector("#backButton").addEventListener("click", showHome);
        detailView.querySelectorAll("[data-tab]").forEach(button => {
          button.addEventListener("click", () => {
            state.activeTab = button.dataset.tab;
            renderDetail(notice);
          });
        });
        renderActiveTab(runState, bundle);
      }

      function renderActiveTab(runState, bundle) {
        const tabContent = detailView.querySelector("#tabContent");
        const tab = state.activeTab;
        if (tab === "overview") tabContent.innerHTML = renderOverview(runState, bundle);
        if (tab === "reports") tabContent.innerHTML = renderReports(bundle);
        if (tab === "verifier") tabContent.innerHTML = renderVerifier(bundle);
        if (tab === "fixes") tabContent.innerHTML = renderFixes(bundle);
        if (tab === "timeline") {
          tabContent.innerHTML = renderTimeline(bundle);
          tabContent.querySelectorAll("[data-timeline-persona]").forEach(button => {
            button.addEventListener("click", () => {
              state.timelinePersona = button.dataset.timelinePersona || "all";
              renderActiveTab(runState, bundle);
            });
          });
        }
        if (tab === "artifacts") tabContent.innerHTML = renderArtifacts(bundle);
      }

      function renderOverview(runState, bundle) {
        const components = runState.components || {};
        const run = state.selectedRun || {};
        return `
          <div class="section-grid">
            <div class="panel">
              <h3>Summary</h3>
              <p>${summaryText(runState)}</p>
              <p>Started ${formatDate(runState.started_at)} and completed ${formatDate(runState.completed_at)}.</p>
              <div class="pill-row">
                ${Object.entries(components).map(([name, status]) => pill(`${name}: ${status}`)).join("") || `<span class="pill">no components</span>`}
              </div>
            </div>
            <div class="panel">
              <h3>Personas</h3>
              <div class="pill-row">
                ${(run.personas || []).map(persona => `<span class="info-chip">${escapeHtml(persona)}</span>`).join("") || `<span class="info-chip">No persona metadata</span>`}
              </div>
            </div>
            <div class="panel">
              <h3>Bundle</h3>
              <p>${bundle ? "Dashboard bundle loaded for this run." : "Only run metadata is loaded for this run."}</p>
              <p><code>${escapeHtml(run.bundle_path || "No bundle path")}</code></p>
            </div>
          </div>
        `;
      }

      function renderReports(bundle) {
        const reports = bundle?.bug_reports || [];
        if (!reports.length) return `<div class="empty">No bug reports in this run.</div>`;
        return `<div class="list">${reports.map(report => `
          <article class="record">
            <div class="record-head">
              <div>
                <h4>${escapeHtml(report.title)}</h4>
                <p class="meta-line">${escapeHtml(report.persona_id)} · ${formatDate(report.created_at)}</p>
              </div>
            </div>
            <p><strong>Persona:</strong> ${escapeHtml(report.persona_id)}</p>
            <p><strong>Observed:</strong> ${escapeHtml(report.observed_behavior)}</p>
            <p><strong>Expected:</strong> ${escapeHtml(report.expected_behavior)}</p>
            <p><strong>Steps Tracing:</strong> ${escapeHtml((report.reproduction_steps || []).join(" -> "))}</p>
          </article>
        `).join("")}</div>`;
      }

      function renderVerifier(bundle) {
        const decisions = bundle?.verifier_decisions || [];
        if (!decisions.length) return `<div class="empty">No verifier decisions in this run.</div>`;
        return `<div class="list">${decisions.map(decision => `
          <article class="record">
            <div class="record-head">
              <div>
                <h4>${labelize(decision.classification)}</h4>
                <p class="meta-line">${escapeHtml(decision.report_id)} · ${formatDate(decision.created_at)}</p>
              </div>
              <div class="pill-row">${pill(decision.classification)}<span class="pill confirmed">${escapeHtml(decision.confidence)}</span></div>
            </div>
            <p>${escapeHtml(decision.reasoning_summary)}</p>
            <p><strong>Next:</strong> ${labelize(decision.required_next_action)}</p>
          </article>
        `).join("")}</div>`;
      }

      function renderFixes(bundle) {
        const fixes = bundle?.fix_results || [];
        if (!fixes.length) return `<div class="empty">No fix results in this run.</div>`;
        return `<div class="list">${fixes.map(result => `
          <article class="record">
            <div class="record-head">
              <div>
                <h4>${labelize(result.status)}</h4>
                <p class="meta-line">${escapeHtml(result.task_id)} · ${duration(result.started_at, result.completed_at)}</p>
              </div>
              <div class="pill-row">${pill(result.status)}${result.promoted ? pill("promoted", "fixed") : pill("not promoted")}</div>
            </div>
            <p>${escapeHtml(result.summary)}</p>
            <p><strong>Changed:</strong> ${escapeHtml((result.changed_files || []).join(", ") || "No files")}</p>
            <p><strong>Tests:</strong> ${labelize(result.tests?.status)} · ${escapeHtml(result.tests?.command || "No command")}</p>
          </article>
        `).join("")}</div>`;
      }

      function renderTimeline(bundle) {
        const events = [...(bundle?.events || [])].sort((a, b) => String(a.timestamp).localeCompare(String(b.timestamp)));
        if (!events.length) return `<div class="empty">No transcript events in this run.</div>`;
        const personaOptions = timelinePersonaOptions(bundle);
        const selectedPersona = personaOptions.includes(state.timelinePersona) ? state.timelinePersona : "all";
        state.timelinePersona = selectedPersona;
        const filteredEvents = selectedPersona === "all" ? events : events.filter(event => event.source_id === selectedPersona);
        const filterControls = personaOptions.length ? `
          <div class="timeline-toolbar">
            <div class="persona-filter-group" aria-label="Timeline persona filter">
              <button class="persona-filter ${selectedPersona === "all" ? "is-active" : ""}" type="button" data-timeline-persona="all" aria-pressed="${selectedPersona === "all"}">All</button>
              ${personaOptions.map(persona => `
                <button class="persona-filter ${selectedPersona === persona ? "is-active" : ""}" type="button" data-timeline-persona="${escapeHtml(persona)}" aria-pressed="${selectedPersona === persona}">${escapeHtml(persona)}</button>
              `).join("")}
            </div>
            <p class="timeline-count">${filteredEvents.length} of ${events.length} events</p>
          </div>
        ` : "";
        if (!filteredEvents.length) {
          return `${filterControls}<div class="empty">No transcript events for this persona.</div>`;
        }
        return `${filterControls}<div class="timeline">${filteredEvents.map(event => {
          const screenshot = (event.artifacts || []).find(artifact => artifact.type === "screenshot");
          const checks = Array.isArray(event.payload?.consistency_checks) ? event.payload.consistency_checks : [];
          return `
            <article class="timeline-item">
              <div class="timeline-meta">${formatDate(event.timestamp)} · ${labelize(event.source)} · ${escapeHtml(event.source_id)}</div>
              <h4>${escapeHtml(event.event_type)}</h4>
              <p>${escapeHtml(event.summary)}</p>
              ${event.payload?.observation_summary ? `<p><strong>Observation:</strong> ${escapeHtml(event.payload.observation_summary)}</p>` : ""}
              ${event.payload?.reasoning ? `<p><strong>Reasoning:</strong> ${escapeHtml(event.payload.reasoning)}</p>` : ""}
              ${checks.length ? `<p><strong>Checks:</strong> ${escapeHtml(checks.join(" | "))}</p>` : ""}
              ${screenshot ? `<div class="artifact" style="margin-top:12px;max-width:360px;"><img alt="Screenshot from ${escapeHtml(event.event_id)}" src="${assetUrl(screenshot.uri)}"><div><strong>${escapeHtml(screenshot.artifact_id)}</strong><span>${escapeHtml(screenshot.uri)}</span></div></div>` : ""}
            </article>
          `;
        }).join("")}</div>`;
      }

      function renderArtifacts(bundle) {
        const artifacts = bundle?.artifacts || [];
        if (!artifacts.length) return `<div class="empty">No artifacts in this run.</div>`;
        return `<div class="artifact-grid">${artifacts.map(artifact => {
          const isImage = artifact.mime_type?.startsWith("image/") || artifact.type === "screenshot";
          const url = assetUrl(artifact.uri);
          return `
            <article class="artifact">
              ${isImage ? `<img alt="${escapeHtml(artifact.artifact_id)}" src="${url}">` : ""}
              <div>
                <strong>${escapeHtml(artifact.artifact_id)}</strong>
                <span>${labelize(artifact.type)} · ${escapeHtml(artifact.mime_type)}</span>
                <span>${escapeHtml(artifact.uri)}</span>
              </div>
            </article>
          `;
        }).join("")}</div>`;
      }

      searchInput.addEventListener("input", renderRunList);
      window.addEventListener("hashchange", () => {
        if (!window.location.hash) showHome();
      });

      loadIndex();
    </script>
  </body>
</html>
